name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to publish"
        required: true
        type: string

permissions:
  contents: write

env:
  MODEL_ARCHIVE_URL: https://github.com/k2-fsa/sherpa-onnx/releases/download/asr-models/sherpa-onnx-streaming-zipformer-small-ctc-zh-int8-2025-04-01.tar.bz2
  MODEL_DIR: resources/models/sherpa-onnx-streaming-zipformer-small-ctc-zh-int8-2025-04-01

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
            if ! git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
              echo "Tag ${tag} does not exist" >&2
              exit 1
            fi
          else
            tag="${GITHUB_REF_NAME}"
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

  build-macos:
    runs-on: macos-latest
    needs: resolve-tag
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.resolve-tag.outputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download sherpa model assets
        shell: bash
        run: |
          mkdir -p resources/models
          curl -L "${MODEL_ARCHIVE_URL}" -o /tmp/sherpa-model.tar.bz2
          tar -xjf /tmp/sherpa-model.tar.bz2 -C resources/models

          if [ ! -f "${MODEL_DIR}/model.int8.onnx" ]; then
            echo "Expected model file missing at ${MODEL_DIR}/model.int8.onnx" >&2
            exit 1
          fi

      - name: Build macOS dmg with Electron Forge
        run: npm run make:mac

      - name: Collect macOS artifact
        id: collect
        shell: bash
        run: |
          asset_path="$(find out/make -type f -name '*.dmg' | head -n 1)"

          if [ -z "${asset_path}" ]; then
            echo "Unable to find macOS dmg in out/make/" >&2
            exit 1
          fi

          echo "asset_path=${asset_path}" >> "${GITHUB_OUTPUT}"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: ${{ steps.collect.outputs.asset_path }}
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    needs: resolve-tag
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ needs.resolve-tag.outputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download sherpa model assets
        shell: bash
        run: |
          mkdir -p resources/models
          curl -L "${MODEL_ARCHIVE_URL}" -o "${RUNNER_TEMP}/sherpa-model.tar.bz2"
          tar -xjf "${RUNNER_TEMP}/sherpa-model.tar.bz2" -C resources/models

          if [ ! -f "${MODEL_DIR}/model.int8.onnx" ]; then
            echo "Expected model file missing at ${MODEL_DIR}/model.int8.onnx" >&2
            exit 1
          fi

      - name: Build Windows installer with Electron Forge
        run: npm run make:win

      - name: Collect Windows artifact
        id: collect
        shell: bash
        run: |
          asset_path="$(find out/make -type f -name '*Setup.exe' | head -n 1)"

          if [ -z "${asset_path}" ]; then
            echo "Unable to find Windows installer in out/make/" >&2
            exit 1
          fi

          echo "asset_path=${asset_path}" >> "${GITHUB_OUTPUT}"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: ${{ steps.collect.outputs.asset_path }}
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs:
      - resolve-tag
      - build-macos
      - build-windows
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-release
          path: dist/macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: dist/windows

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-tag.outputs.tag }}
          files: |
            dist/macos/*.dmg
            dist/windows/*.exe
          fail_on_unmatched_files: true
          overwrite_files: true
          generate_release_notes: true
